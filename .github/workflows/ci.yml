name: CI
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install black ruff
      - run: black --check .claude/hooks/ bin/ 2>/dev/null || true
      - run: ruff check .claude/hooks/ bin/ 2>/dev/null || true
  validate-claude-md:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check CLAUDE.md line count
        run: |
          LINES=$(wc -l < CLAUDE.md)
          echo "CLAUDE.md: $LINES lines"
          [ "$LINES" -le 120 ] || (echo "CLAUDE.md exceeds 120 lines" && exit 1)
